name: Python 测试                  # Workflow 名称（GitHub 面板显示）

on:
  push:                            # 触发条件：每次 push
    branches: [main, master]
  pull_request:                    # 触发条件：每次 PR
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest         # 跑在 GitHub 的 Ubuntu 虚拟机上

    defaults:
      run:
        working-directory: rag-docker

    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 装 Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: 装依赖
        run: pip install -r requirements.txt

      - name: 跑测试
        run: python -m pytest tests/ -v