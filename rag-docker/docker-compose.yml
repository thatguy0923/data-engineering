services:
  pipeline:
    build: .
    environment:
      PYSPARK_PYTHON: python
      PYSPARK_DRIVER_PYTHON: python
      HF_ENDPOINT: https://hf-mirror.com
    volumes:
      - ./data:/rag-app/data         # 数据持久化（Tatoeba 下载 + 向量）
      - ./output:/rag-app/output     # 搜索结果输出
      - hf_cache:/root/.cache/huggingface   # 模型缓存（500MB，避免每次重下）
    profiles:
      - pipeline              # 默认不启动，需要时加 --profile pipeline

  api:
    build: .
    command: uvicorn api_server:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"           # 本机 8000 → 容器 8000
    volumes:
      - ./data:/rag-app/data
      - hf_cache:/root/.cache/huggingface

volumes:
  hf_cache:
